<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tomato Leaf Classifier 🍅</title>

    <!-- HANYA JS BIASA, TANPA TFJS -->
    <script defer src="script.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        #container {
            width: 500px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
        }
        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-top: 10px;
            border: 1px solid #ccc;
        }
        #predictBtn {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            background: #e8f5e9;
        }
    </style>
</head>

<body>
<div id="container">

    <h2>Klasifikasi Penyakit Daun Tomat 🍅</h2>

    <p>Upload foto daun tomat:</p>
    <input type="file" id="imageInput" accept="image/*">

    <img id="preview" src="" alt="Preview Image">

    <h3>Grad-CAM Visualization</h3>
    <img id="gradcamImage" style="width:100%; border:1px solid #ccc; display:none;">

    <button id="predictBtn" disabled>Prediksi</button>

    <h3>Hasil:</h3>
    <div id="output">Belum ada prediksi.</div>

</div>
</body>
</html>
